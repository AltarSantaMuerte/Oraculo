<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<meta name="theme-color" content="#000000">

<title>Oráculo de La Santa Muerte</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:black;
position:relative;
font-family:serif;
}

/* ALTAR */

#altar{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:2s;
overflow:hidden;
}

/* IMAGEM */

.main-image{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
background:black;
z-index:1;
animation:breath 8s ease-in-out infinite;
}

/* RESPIRAÇÃO DA SANTA */

@keyframes breath{

0%{
transform:scale(1);
}

50%{
transform:scale(1.012);
}

100%{
transform:scale(1);
}

}

/* FUMAÇA */

.smoke{
position:absolute;
bottom:-200px;
width:320px;
height:320px;

background:
radial-gradient(
circle,
rgba(220,220,220,0.30),
transparent 70%
);

filter:blur(35px);

animation:smoke 18s linear infinite;

z-index:3;
pointer-events:none;
}

.smoke:nth-child(1){
left:-10%;
}

.smoke:nth-child(2){
right:-10%;
animation-delay:8s;
}

@keyframes smoke{

0%{
transform:translateY(0) scale(1);
opacity:0;
}

20%{
opacity:0.6;
}

100%{
transform:translateY(-140vh) scale(2);
opacity:0;
}

}

/* PARTÍCULAS DOURADAS */

.particle{
position:absolute;
width:3px;
height:3px;
border-radius:50%;
background:rgba(255,210,120,0.7);
box-shadow:
0 0 8px rgba(255,210,120,0.9);

animation:floatParticle linear infinite;
z-index:4;
}

@keyframes floatParticle{

0%{
transform:translateY(0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* AMBIENTE LATERAL WEB */

.side-glow{
position:absolute;
top:0;
width:20%;
height:100%;
z-index:2;
pointer-events:none;
}

.left-glow{
left:0;
background:
radial-gradient(circle at left,
rgba(80,0,0,0.35),
transparent 70%);
}

.right-glow{
right:0;
background:
radial-gradient(circle at right,
rgba(80,0,0,0.35),
transparent 70%);
}

/* TEXTO */

.scroll-text{
position:absolute;

top:65%;
left:50%;

transform:translate(-50%,-50%);

width:220px;

text-align:center;

font-size:17px;

line-height:1.25;

color:#5b3417;

z-index:10;

font-weight:bold;

text-shadow:
0 0 3px rgba(0,0,0,0.95),
0 0 8px rgba(0,0,0,0.85),
0 0 12px rgba(255,220,120,0.18),
0 0 22px rgba(255,210,100,0.08);

transition:1.5s;
}

/* BOTÃO */

.button{
position:absolute;

bottom:35px;

left:50%;

transform:translateX(-50%);

padding:12px 24px;

border:none;

border-radius:30px;

background:rgba(0,0,0,0.65);

color:#f3d7a0;

font-size:14px;

letter-spacing:2px;

z-index:20;

backdrop-filter:blur(6px);

box-shadow:
0 0 15px rgba(255,200,100,0.12);

transition:1s;
}

/* ENTRADA */

#welcome{
position:absolute;

width:100%;
height:100%;

background:black;

display:flex;

justify-content:center;
align-items:center;

overflow:hidden;

z-index:100;
}

/* CORTINAS */

.curtain-left,
.curtain-right{

position:absolute;

top:0;

width:50%;
height:100%;

background:
repeating-linear-gradient(
90deg,
#160000 0px,
#2b0000 12px,
#120000 24px,
#2a0000 36px
);

box-shadow:
inset 0 0 40px rgba(0,0,0,0.9),
inset 0 0 90px rgba(0,0,0,0.6);

z-index:101;

transition:2.8s cubic-bezier(.77,0,.18,1);
}

.curtain-left{
left:0;
border-right:1px solid rgba(255,215,120,0.15);
}

.curtain-right{
right:0;
border-left:1px solid rgba(255,215,120,0.15);
}

/* BOTÃO ENTRAR */

.enter-button{

position:relative;

padding:18px 32px;

border:1px solid rgba(255,230,180,0.4);

background:rgba(0,0,0,0.65);

color:#f3d7a0;

font-size:18px;

letter-spacing:3px;

border-radius:40px;

backdrop-filter:blur(8px);

z-index:120;

box-shadow:
0 0 20px rgba(255,220,120,0.15);
}

/* TRANSIÇÕES */

.fade-out{
animation:fadeOutMagic 1.2s ease forwards;
}

.fade-in{
animation:fadeInMagic 2s ease;
}

@keyframes fadeOutMagic{

0%{
opacity:1;
transform:translate(-50%,-50%);
filter:blur(0);
}

100%{
opacity:0;
transform:translate(-50%,-58%);
filter:blur(14px);
}

}

@keyframes fadeInMagic{

0%{
opacity:0;
transform:translate(-50%,-42%);
filter:blur(14px);
}

100%{
opacity:1;
transform:translate(-50%,-50%);
filter:blur(0);
}

}

</style>
</head>

<body>

<!-- ENTRADA -->

<div id="welcome">

<div
class="curtain-left"
id="curtainLeft">
</div>

<div
class="curtain-right"
id="curtainRight">
</div>

<button
class="enter-button"
id="enterButton"
onclick="enterAltar()">

✦ Entrar al Altar ✦

</button>

</div>

<!-- ALTAR -->

<div id="altar">

<div class="side-glow left-glow"></div>
<div class="side-glow right-glow"></div>

<img
class="main-image"
src="https://raw.githubusercontent.com/AltarSantaMuerte/Oraculo/main/background.jpg">

<div class="smoke"></div>
<div class="smoke"></div>

<div
class="scroll-text"
id="scrollText">

Santa Muerte,
guía mis pensamientos,
protege mi espíritu
y aleja toda oscuridad
de mi camino.

Permite que mi alma
encuentre claridad,
paz y fuerza
para continuar.

Amén.

</div>

<button
class="button"
id="oracleButton"
onclick="revealOracle()">

✦ Revelar Oráculo ✦

</button>

</div>

<!-- ÁUDIO PRINCIPAL -->

<audio
id="bgMusic"
loop>

<source
src="https://files.catbox.moe/h6a4w1.mp3"
type="audio/mpeg">

</audio>

<!-- GONGO -->

<audio id="gongSound">

<source
src="https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3"
type="audio/mpeg">

</audio>

<script>

/* ÁUDIOS */

const audio =
document.getElementById("bgMusic");

const gong =
document.getElementById("gongSound");

/* CONTADOR */

let visitCount =
localStorage.getItem("visitCount") || 0;

visitCount++;

localStorage.setItem(
"visitCount",
visitCount
);

/* TEXTO */

const text =
document.getElementById("scrollText");

/* ORAÇÃO ESPECIAL */

if(visitCount % 20 == 0){

text.innerHTML =

"La Santa Muerte abre un nuevo ciclo ante ti.<br><br>Que toda sombra se transforme en sabiduría y toda herida en fuerza.<br><br>Hoy el altar escucha tu espíritu con especial atención.";

}

/* FRASES */

const messages = [

"La Santa dice: descansa, también sobreviviste hoy.",

"No cargues el mundo entero esta noche.",

"La Flaquita ve tu cansancio.",

"Todo cambia incluso el dolor.",

"Respira. Aún hay camino.",

"La Santa protege corazones cansados.",

"No luches contra cada sombra.",

"La paz también llega despacio.",

"La muerte también enseña calma.",

"Tu alma aún tiene luz.",

"No temas al cambio.",

"Todo renace después del silencio.",

"La Santa escucha tu dolor.",

"Las heridas también enseñan.",

"No toda oscuridad es enemiga.",

"La calma llegará.",

"Tu espíritu sigue fuerte.",

"La Flaquita protege tu camino.",

"Cada noche trae revelaciones.",

"No temas soltar lo que pesa."

];

/* PARTÍCULAS */

for(let i=0;i<45;i++){

const particle =
document.createElement("div");

particle.classList.add("particle");

particle.style.left =
Math.random()*100+"vw";

particle.style.bottom =
"-10px";

particle.style.animationDuration =
(10 + Math.random()*12)+"s";

particle.style.animationDelay =
Math.random()*10+"s";

document.body.appendChild(particle);

}

/* ENTRAR */

function enterAltar(){

/* VIBRAÇÃO */

if(navigator.vibrate){
navigator.vibrate(120);
}

/* GONGO */

gong.play();

/* MÚSICA */

setTimeout(()=>{
audio.play();
},700);

/* BOTÃO SOME */

const enterButton =
document.getElementById("enterButton");

enterButton.style.opacity="0";

setTimeout(()=>{
enterButton.style.display="none";
},600);

/* CORTINAS */

setTimeout(()=>{

document
.getElementById("curtainLeft")
.style.transform="translateX(-100%)";

document
.getElementById("curtainRight")
.style.transform="translateX(100%)";

},500);

/* TELA SOME */

setTimeout(()=>{

document
.getElementById("welcome")
.style.display="none";

},2800);

/* ALTAR */

document
.getElementById("altar")
.style.opacity="1";

}

/* ORÁCULO */

function revealOracle(){

/* VIBRAÇÃO */

if(navigator.vibrate){
navigator.vibrate([120,60,120]);
}

const button =
document.getElementById("oracleButton");

/* BOTÃO SOME */

button.style.opacity="0";

setTimeout(()=>{
button.style.display="none";
},700);

/* TEXTO SOME */

text.classList.add("fade-out");

setTimeout(()=>{

const randomMessage =
messages[Math.floor(
Math.random()*messages.length)];

text.innerHTML=randomMessage;

text.classList.remove("fade-out");

void text.offsetWidth;

text.classList.add("fade-in");

},1200);

}

</script>

</body>
</html>
