<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Oráculo de La Santa Muerte</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:black;
position:relative;
font-family:serif;
}

/* ALTAR */

#altar{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:2s;
}

/* IMAGEM */

.main-image{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
background:black;
z-index:1;
}

/* FUMAÇA */

.smoke{
position:absolute;
bottom:-250px;
width:320px;
height:320px;

background:
radial-gradient(
circle,
rgba(220,220,220,0.35),
transparent 70%
);

filter:blur(35px);

animation:smoke 14s linear infinite;

z-index:3;

pointer-events:none;
}

.smoke:nth-child(1){
left:-10%;
}

.smoke:nth-child(2){
right:-10%;
animation-delay:7s;
}

@keyframes smoke{

0%{
transform:translateY(0) scale(1);
opacity:0;
}

20%{
opacity:0.7;
}

100%{
transform:translateY(-140vh) scale(2);
opacity:0;
}

}

/* TEXTO */

.scroll-text{
position:absolute;
top:65%;
left:50%;

transform:translate(-50%,-50%);

width:210px;

text-align:center;

font-size:17px;

line-height:1.35;

color:#4b2d12;

z-index:10;

font-weight:bold;

text-shadow:
0 0 8px rgba(255,230,180,0.15),
0 0 18px rgba(255,220,140,0.08);

transition:1.5s;
}

/* BOTÃO */

.button{
position:absolute;

bottom:35px;

left:50%;

transform:translateX(-50%);

padding:12px 22px;

border:none;

border-radius:30px;

background:rgba(0,0,0,0.6);

color:#f3d7a0;

font-size:14px;

letter-spacing:2px;

z-index:20;

backdrop-filter:blur(6px);

transition:1s;
}

/* TELA INICIAL */

#welcome{
position:absolute;

width:100%;
height:100%;

background:black;

display:flex;

justify-content:center;
align-items:center;

overflow:hidden;

z-index:100;

transition:2s;
}

/* CORTINAS */

.curtain-left,
.curtain-right{

position:absolute;

top:0;

width:50%;
height:100%;

background:
repeating-linear-gradient(
90deg,
#120000 0px,
#220000 18px,
#120000 36px
);

z-index:101;

transition:2.5s ease;
}

.curtain-left{
left:0;
border-right:1px solid rgba(255,215,120,0.15);
}

.curtain-right{
right:0;
border-left:1px solid rgba(255,215,120,0.15);
}

/* BOTÃO ENTRAR */

.enter-button{

position:relative;

padding:18px 32px;

border:1px solid rgba(255,230,180,0.4);

background:rgba(0,0,0,0.65);

color:#f3d7a0;

font-size:18px;

letter-spacing:3px;

border-radius:40px;

backdrop-filter:blur(8px);

z-index:120;
}

/* TRANSIÇÕES */

.fade-out{
animation:fadeOutMagic 1.2s ease forwards;
}

.fade-in{
animation:fadeInMagic 2s ease;
}

@keyframes fadeOutMagic{

0%{
opacity:1;
transform:translate(-50%,-50%);
filter:blur(0);
}

100%{
opacity:0;
transform:translate(-50%,-58%);
filter:blur(14px);
}

}

@keyframes fadeInMagic{

0%{
opacity:0;
transform:translate(-50%,-42%);
filter:blur(14px);
}

100%{
opacity:1;
transform:translate(-50%,-50%);
filter:blur(0);
}

}

</style>
</head>

<body>

<!-- ENTRADA -->

<div id="welcome">

<div
class="curtain-left"
id="curtainLeft">
</div>

<div
class="curtain-right"
id="curtainRight">
</div>

<button
class="enter-button"
onclick="enterAltar()">

✦ Entrar al Altar ✦

</button>

</div>

<!-- ALTAR -->

<div id="altar">

<img
class="main-image"
src="https://raw.githubusercontent.com/AltarSantaMuerte/Oraculo/main/background.jpg">

<div class="smoke"></div>
<div class="smoke"></div>

<div
class="scroll-text"
id="scrollText">

Santa Muerte,
guía mis pensamientos,
protege mi espíritu
y aleja toda oscuridad
de mi camino.

Permite que mi alma
encuentre claridad,
paz y fuerza
para continuar.

Amén.

</div>

<button
class="button"
id="oracleButton"
onclick="revealOracle()">

✦ Revelar Oráculo ✦

</button>

</div>

<!-- ÁUDIO -->

<audio
id="bgMusic"
loop>

<source
src="https://files.catbox.moe/h6a4w1.mp3"
type="audio/mpeg">

</audio>

<script>

const audio =
document.getElementById("bgMusic");

/* FRASES */

const messages = [

"La Santa dice: descansa, también sobreviviste hoy.",

"No cargues el mundo entero esta noche.",

"La Flaquita ve tu cansancio.",

"Todo cambia incluso el dolor.",

"Respira. Aún hay camino.",

"La Santa protege corazones cansados.",

"No luches contra cada sombra.",

"La paz también llega despacio.",

"La muerte también enseña calma.",

"Tu alma aún tiene luz.",

"No temas al cambio.",

"Todo renace después del silencio.",

"La Santa escucha tu dolor.",

"Las heridas también enseñan.",

"No toda oscuridad es enemiga.",

"La calma llegará.",

"Tu espíritu sigue fuerte.",

"La Flaquita protege tu camino.",

"Cada noche trae revelaciones.",

"No temas soltar lo que pesa."

];

/* ENTRAR */

function enterAltar(){

audio.play();

/* CORTINAS */

document
.getElementById("curtainLeft")
.style.transform="translateX(-100%)";

document
.getElementById("curtainRight")
.style.transform="translateX(100%)";

document
.getElementById("welcome")
.style.background="transparent";

/* SOME TELA */

setTimeout(()=>{

document
.getElementById("welcome")
.style.display="none";

},2200);

/* ALTAR */

document
.getElementById("altar")
.style.opacity="1";

}

/* ORÁCULO */

function revealOracle(){

const text =
document.getElementById("scrollText");

const button =
document.getElementById("oracleButton");

/* BOTÃO SOME */

button.style.opacity="0";

setTimeout(()=>{
button.style.display="none";
},700);

/* TEXTO SAI */

text.classList.add("fade-out");

setTimeout(()=>{

const randomMessage =
messages[Math.floor(
Math.random()*messages.length)];

/* TROCA TEXTO */

text.innerHTML=randomMessage;

/* REMOVE ANIMAÇÃO ANTIGA */

text.classList.remove("fade-out");

/* ENTRA NOVAMENTE */

text.classList.add("fade-in");

},1200);

}

</script>

</body>
</html>
