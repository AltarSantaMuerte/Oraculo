<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>La Santa Muerte</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:black;
position:relative;
font-family:serif;
}

/* ALTAR */

#altar{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:2s;
}

/* IMAGEM */

.main-image{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* FUMAÇA */

.smoke{
position:absolute;
bottom:-300px;
width:400px;
height:400px;
background:radial-gradient(circle,
rgba(255,255,255,0.08),
transparent 70%);
filter:blur(60px);
animation:smoke 18s linear infinite;
z-index:3;
}

.smoke:nth-child(1){
left:-10%;
}

.smoke:nth-child(2){
right:-10%;
animation-delay:8s;
}

@keyframes smoke{

0%{
transform:translateY(0) scale(1);
opacity:0;
}

20%{
opacity:0.4;
}

100%{
transform:translateY(-140vh) scale(2);
opacity:0;
}

}

/* TEXTO */

.scroll-text{
position:absolute;
top:47%;
left:50%;
transform:translate(-50%,-50%);
width:170px;
text-align:center;
font-size:14px;
line-height:1.5;
color:#4b2d12;
z-index:5;
font-weight:bold;
}

/* BOTÃO ORÁCULO */

.button{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:12px 22px;
border:none;
border-radius:30px;
background:rgba(0,0,0,0.55);
color:#f3d7a0;
font-size:14px;
letter-spacing:2px;
z-index:10;
backdrop-filter:blur(6px);
}

/* TELA INICIAL */

#welcome{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
transition:2s;
}

/* BOTÃO ENTRAR */

.enter-button{
padding:18px 32px;
border:1px solid rgba(255,230,180,0.4);
background:rgba(0,0,0,0.6);
color:#f3d7a0;
font-size:18px;
letter-spacing:3px;
border-radius:40px;
backdrop-filter:blur(8px);
}

/* ANIMAÇÃO TEXTO */

.fade{
animation:fadeMagic 1.5s ease;
}

@keyframes fadeMagic{

0%{
opacity:0;
transform:translate(-50%,-40%);
filter:blur(10px);
}

100%{
opacity:1;
transform:translate(-50%,-50%);
filter:blur(0);
}

}

</style>
</head>

<body>

<!-- TELA INICIAL -->

<div id="welcome">

<button
class="enter-button"
onclick="enterAltar()">

✦ Entrar al Altar ✦

</button>

</div>

<!-- ALTAR -->

<div id="altar">

<img
class="main-image"
src="https://raw.githubusercontent.com/bortolinrafael/Santisima-Muerte/main/background.jpg">

<div class="smoke"></div>
<div class="smoke"></div>

<div class="scroll-text"
id="scrollText">

Santa Muerte,
guía mis pensamientos,
protege mi espíritu
y aleja toda oscuridad
de mi camino.

Permite que mi alma
encuentre claridad,
paz y fuerza
para continuar.

Amén.

</div>

<button
class="button"
id="oracleButton"
onclick="revealOracle()">

✦ Revelar Oráculo ✦

</button>

</div>

<!-- MÚSICA -->

<audio id="bgMusic" loop>

<source
src="https://raw.githubusercontent.com/bortolinrafael/Santisima-Muerte/main/music.mp3"
type="audio/mpeg">

</audio>

<script>

const audio =
document.getElementById("bgMusic");

const messages = [

"La Santa dice: descansa, también sobreviviste hoy.",

"No cargues el mundo entero esta noche.",

"La Flaquita ve tu cansancio.",

"Todo cambia incluso el dolor.",

"Respira. Aún hay camino.",

"La Santa protege corazones cansados.",

"No luches contra cada sombra.",

"La paz también llega despacio."

];

function enterAltar(){

document
.getElementById("welcome")
.style.opacity="0";

setTimeout(()=>{

document
.getElementById("welcome")
.style.display="none";

},1800);

document
.getElementById("altar")
.style.opacity="1";

audio.play();

}

function revealOracle(){

const text =
document.getElementById("scrollText");

const button =
document.getElementById("oracleButton");

button.style.opacity="0";

setTimeout(()=>{
button.style.display="none";
},700);

const randomMessage =
messages[Math.floor(
Math.random()*messages.length)];

text.classList.remove("fade");

void text.offsetWidth;

text.innerHTML=randomMessage;

text.classList.add("fade");

}

</script>

</body>
</html>
