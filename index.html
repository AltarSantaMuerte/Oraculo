<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Santa Muerte</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100%;
height:100vh;
overflow:hidden;
font-family:'Cinzel', serif;
background:black;
display:flex;
justify-content:center;
align-items:center;
position:relative;
color:#f5e6c8;
}

/* FUNDO */

.background{
position:absolute;
width:100%;
height:100%;
background:url('background.jpeg') center center no-repeat;
background-size:cover;
filter:brightness(0.65);
z-index:1;
}

/* ESCURECER */

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:2;
}

/* FUMAÇA */

.smoke{
position:absolute;
bottom:-200px;
width:400px;
height:400px;
background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
animation:smoke 18s infinite linear;
filter:blur(40px);
opacity:0.5;
z-index:3;
}

.smoke:nth-child(1){
left:10%;
animation-delay:0s;
}

.smoke:nth-child(2){
right:10%;
animation-delay:7s;
}

@keyframes smoke{
0%{
transform:translateY(0) scale(1);
opacity:0;
}
20%{
opacity:0.4;
}
100%{
transform:translateY(-120vh) scale(1.8);
opacity:0;
}
}

/* TÍTULO */

.title{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:34px;
letter-spacing:3px;
z-index:5;
text-shadow:0 0 15px rgba(255,215,150,0.5);
}

/* PERGAMINHO TEXTO */

.scroll-text{
position:absolute;
top:47%;
left:50%;
transform:translate(-50%,-50%);
width:230px;
text-align:center;
font-size:15px;
line-height:1.6;
z-index:6;
color:#2a1b08;
padding:10px;
animation:fadeIn 2s ease;
}

/* BOTÃO */

.button{
position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
padding:14px 26px;
border:1px solid rgba(255,230,180,0.5);
background:rgba(0,0,0,0.4);
backdrop-filter:blur(4px);
color:#f5e6c8;
font-size:15px;
letter-spacing:2px;
cursor:pointer;
border-radius:30px;
transition:0.4s;
z-index:10;
font-family:'Cinzel', serif;
}

.button:hover{
background:rgba(255,230,180,0.15);
transform:translateX(-50%) scale(1.05);
}

/* ANIMAÇÃO TEXTO */

.fade{
animation:fadeMagic 1.5s ease;
}

@keyframes fadeMagic{
0%{
opacity:0;
transform:translate(-50%,-45%);
}
100%{
opacity:1;
transform:translate(-50%,-50%);
}
}

@keyframes fadeIn{
0%{
opacity:0;
}
100%{
opacity:1;
}
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:28px;
top:22px;
}

.scroll-text{
width:210px;
font-size:14px;
top:47%;
}

.button{
bottom:50px;
font-size:13px;
padding:12px 22px;
}

}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="smoke"></div>
<div class="smoke"></div>

<h1 class="title">La Santa Muerte</h1>

<div class="scroll-text" id="scrollText">

Santa Muerte,
guía mis pensamientos,
protege mi espíritu
y aleja toda oscuridad
de mi camino.

Permite que mi alma
encuentre claridad,
paz y fuerza
para continuar.

Amén.

</div>

<button class="button" onclick="revealOracle()">
✦ Revelar Oráculo
</button>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const messages = [

"La Santa dice: descansa, también sobreviviste hoy.",

"No cargues el mundo entero esta noche.",

"La Flaquita ve tu cansancio.",

"Todo cambia incluso el dolor.",

"Hoy no fue fácil… pero sigues aquí.",

"La muerte enseña a valorar lo simple.",

"Respira. Aún hay camino.",

"No temas comenzar de nuevo.",

"Tu alma necesita silencio.",

"La Santa protege corazones cansados.",

"Hasta la tristeza descansa algún día.",

"No todo peso debe quedarse contigo.",

"Las noches difíciles también terminan.",

"La Flaquita escucha lo que callas.",

"No confundas pausa con derrota.",

"Tu energía volverá.",

"Hay fuerza incluso en la tristeza.",

"La Santa recuerda: sigue.",

"No estás tan perdido como crees.",

"El alma también necesita calma.",

"A veces sobrevivir ya es victoria.",

"La Santa cuida tus pasos invisibles.",

"Todo renacimiento comienza en silencio.",

"No luches contra cada sombra.",

"La paz también llega despacio."

];

function revealOracle(){

const text = document.getElementById("scrollText");

const randomMessage =
messages[Math.floor(Math.random() * messages.length)];

text.classList.remove("fade");

void text.offsetWidth;

text.innerHTML = randomMessage;

text.classList.add("fade");

}

</script>

</body>
</html>
